<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SimHealth — Unsubscribe</title>

<style>
body{
  font-family:system-ui,Arial,sans-serif;
  background:#0b1220;
  color:white;
  padding:40px;
  margin:0;
}
.card{
  max-width:720px;
  margin:auto;
  background:#111b2e;
  border-radius:16px;
  padding:24px;
}
a{ color:#2dd4bf; }
.button{
  display:inline-block;
  margin-top:16px;
  padding:12px 18px;
  background:#2dd4bf;
  color:#071018;
  border-radius:12px;
  font-weight:700;
  text-decoration:none;
}
.small{ opacity:.75; font-size:14px; line-height:1.5; }
</style>
</head>

<body>
<div class="card">
  <h2>SimHealth</h2>

  <p id="msg"></p>
  <p id="redirectMsg" class="small"></p>

  <a class="button" id="backBtn" href="https://simhealth.pro/en/home/">Back to SimHealth</a>
</div>

<!-- ✅ Load the single source of truth -->
<script src="/assets/app-config.js"></script>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const token = params.get("token");
  const langRaw = (params.get("lang") || "en").toLowerCase();
  const lang = (langRaw === "fr") ? "fr" : "en";

  const msg = document.getElementById("msg");
  const redirectMsg = document.getElementById("redirectMsg");
  const backBtn = document.getElementById("backBtn");

  const TEXT = {
    en: {
      processing: "Processing your unsubscribe request…",
      invalid: "Invalid unsubscribe link.",
      redirect: "Redirecting…",
      back: "Back to SimHealth",
      backUrl: "https://simhealth.pro/en/home/"
    },
    fr: {
      processing: "Traitement de votre demande de désinscription…",
      invalid: "Lien de désinscription invalide.",
      redirect: "Redirection…",
      back: "Retour à SimHealth",
      backUrl: "https://simhealth.pro/fr/accueil/"
    }
  };

  // UI
  msg.textContent = TEXT[lang].processing;
  backBtn.textContent = TEXT[lang].back;
  backBtn.href = TEXT[lang].backUrl;

  // Get exec endpoint from config
  const exec =
    (window.SIMHEALTH &&
     window.SIMHEALTH.ENDPOINTS &&
     window.SIMHEALTH.ENDPOINTS.SIGNUPS_EXEC) ? String(window.SIMHEALTH.ENDPOINTS.SIGNUPS_EXEC).trim() : "";

  if(!token){
    msg.textContent = TEXT[lang].invalid;
    return;
  }

  if(!exec){
    msg.textContent = (lang === "fr")
      ? "Configuration manquante. Impossible de traiter la désinscription."
      : "Missing configuration. Unable to process unsubscribe.";
    return;
  }

  // ✅ Best practice: redirect to the Apps Script page (no CORS issues, no weird browser blocking)
  const url =
    exec +
    "?action=unsubscribe" +
    "&token=" + encodeURIComponent(token) +
    "&lang=" + encodeURIComponent(lang);

  redirectMsg.textContent = TEXT[lang].redirect;

  // small delay so user sees the message
  setTimeout(function(){
    window.location.replace(url);
  }, 250);
})();
</script>

</body>
</html>
