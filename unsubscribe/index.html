<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SimHealth — Unsubscribe</title>

<style>
body{
  font-family:system-ui,Arial,sans-serif;
  background:#0b1220;
  color:white;
  padding:40px;
  margin:0;
}

.card{
  max-width:720px;
  margin:auto;
  background:#111b2e;
  border-radius:16px;
  padding:24px;
}

a{
  color:#2dd4bf;
}

.button{
  display:inline-block;
  margin-top:16px;
  padding:12px 18px;
  background:#2dd4bf;
  color:#071018;
  border-radius:12px;
  font-weight:700;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h2>SimHealth</h2>

<p id="msg"></p>

<a class="button" href="https://simhealth.pro/en/home/" id="backBtn">
Back to SimHealth
</a>

</div>

<script>

const EXEC = "https://script.google.com/macros/s/AKfycbxJ1xiM2CKY_H4KQRpcJFqjXXUjWKecK_K8Uyqv4AIgeV2uhj3iNjmNk7iJK9CxRTDQ/exec";

const params = new URLSearchParams(location.search);
const token = params.get("token");
const lang = params.get("lang") || "en";

const msg = document.getElementById("msg");
const backBtn = document.getElementById("backBtn");

const TEXT = {

  en: {
    processing: "Processing your unsubscribe request…",
    done: "You have been unsubscribed. You will not receive further SimHealth update emails.",
    invalid: "Invalid unsubscribe link.",
    fallback: "Unsubscribe request sent. If you still receive emails please open the link in a private window.",
    back: "Back to SimHealth"
  },

  fr: {
    processing: "Traitement de votre demande de désinscription…",
    done: "Vous avez été désinscrit. Vous ne recevrez plus les emails d’actualités SimHealth.",
    invalid: "Lien de désinscription invalide.",
    fallback: "Demande de désinscription envoyée. Si vous recevez encore des emails, ouvrez ce lien dans une fenêtre privée.",
    back: "Retour à SimHealth"
  }

};

msg.textContent = TEXT[lang].processing;
backBtn.textContent = TEXT[lang].back;

if(lang === "fr"){
  backBtn.href = "https://simhealth.pro/fr/accueil/";
}

if(!token){

  msg.textContent = TEXT[lang].invalid;

}
else{

  const url =
    EXEC +
    "?action=unsubscribe" +
    "&token=" + encodeURIComponent(token) +
    "&lang=" + encodeURIComponent(lang);

  fetch(url,{mode:"no-cors"})
  .then(()=>{
      msg.textContent = TEXT[lang].done;
  })
  .catch(()=>{
      msg.textContent = TEXT[lang].fallback;
  });

}

</script>

</body>
</html>
